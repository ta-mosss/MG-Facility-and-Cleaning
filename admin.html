function ts(){return new Date().toISOString();}

async function nextNumber(type){
  const year=new Date().getFullYear();
  const key=`${type}_${year}`;
  const ref=col("meta").doc("counters");
  const snap=await ref.get();
  const data=snap.exists?snap.data():{};
  const n=(data[key]||0)+1;
  await ref.set({...data,[key]:n},{merge:true});
  return {n,year};
}

async function upsertCustomer(form){
  const phone=String(form.phone||"").replace(/[^0-9]/g,"");
  if(!phone) return null;
  const snap=await col("customers").where("phoneClean","==",phone).limit(1).get();
  const payload={
    name:form.clientName||form.name||"",
    phone:form.phone||"",
    phoneClean:phone,
    email:form.email||"",
    company:form.company||"",
    address:form.address||"",
    propertyType:form.propertyType||"",
    updatedAt:ts(),
  };
  if(!snap.empty){
    const id=snap.docs[0].id;
    await col("customers").doc(id).update(payload);
    return id;
  }
  const ref=await col("customers").add({...payload,createdAt:ts()});
  return ref.id;
}

function resizeImage(file,maxDim=1280,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width,height}=img;
        if(width>height&&width>maxDim){height=Math.round(height*maxDim/width);width=maxDim;}
        else if(height>maxDim){width=Math.round(width*maxDim/height);height=maxDim;}
        const canvas=document.createElement("canvas");
        canvas.width=width;canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

    let drawing=false;
    const getXY=(e)=>{const rect=canvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return[src.clientX-rect.left,src.clientY-rect.top];};
    const start=(e)=>{e.preventDefault();drawing=true;const[x,y]=getXY(e);ctx.beginPath();ctx.moveTo(x,y);};
    const move=(e)=>{e.preventDefault();if(!drawing)return;const[x,y]=getXY(e);ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#00C896";ctx.lineTo(x,y);ctx.stroke();};
    const stop=()=>{drawing=false;};
    canvas.addEventListener("mousedown",start);
    canvas.addEventListener("mousemove",move);
    canvas.addEventListener("mouseup",stop);
    canvas.addEventListener("touchstart",start,{passive:false});
    canvas.addEventListener("touchmove",move,{passive:false});
    canvas.addEventListener("touchend",stop);
    const clearBtn=document.getElementById(clearId);
    const clearFn=()=>ctx.clearRect(0,0,canvas.width,canvas.height);
    if(clearBtn) clearBtn.addEventListener("click",clearFn);
    return()=>{
      canvas.removeEventListener("mousedown",start);
      canvas.removeEventListener("mousemove",move);
      canvas.removeEventListener("mouseup",stop);
      canvas.removeEventListener("touchstart",start);
      canvas.removeEventListener("touchmove",move);
      canvas.removeEventListener("touchend",stop);
      if(clearBtn) clearBtn.removeEventListener("click",clearFn);
    };
  },[]);
  return(
    <div>
      <canvas id={padId} width="600" height="160" style={{width:"100%",border:"1px solid var(--border2)",borderRadius:10,background:"#fff",display:"block",touchAction:"none"}}/>
      <button id={clearId} type="button" className="btn btn-secondary btn-sm" style={{marginTop:8}}>🗑 Clear Signature</button>
    </div>
  );
}

function PhotoUploader({photos,setPhotos,max=8}){
  const fRef=useRef();
  const add=async(files)=>{
    const arr=Array.from(files).slice(0,max-photos.length);
    for(const f of arr){
      try{const dataUrl=await resizeImage(f);setPhotos(p=>[...p,{dataUrl,name:f.name}]);}catch(e){console.error(e);}
    }
  };
  return(
    <div className="photo-drop" onClick={()=>fRef.current.click()}
      onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add("over");}}
      onDragLeave={e=>e.currentTarget.classList.remove("over")}
      onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove("over");add(e.dataTransfer.files);}}>
      <input type="file" ref={fRef} accept="image/*" multiple onChange={e=>add(e.target.files)}/>
      {photos.length===0?<span style={{fontSize:12,color:"var(--text4)"}}>Drag &amp; drop or click to upload photos</span>:(
        <div className="photo-grid">
          {photos.map((p,i)=>(
            <div key={i} className="photo-thumb">
              <img src={p.dataUrl} alt={p.name}/>
              <button className="photo-rm" onClick={e=>{e.stopPropagation();setPhotos(ps=>ps.filter((_,j)=>j!==i));}}>✕</button>
            </div>
          ))}
          {photos.length<max&&<div style={{width:72,height:72,border:"1px dashed var(--border2)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"var(--text4)"}}>+</div>}
        </div>
      )}
    </div>
  );
}

function startOfMonth(){const d=new Date();d.setDate(1);d.setHours(0,0,0,0);return d.getTime();}

function Dashboard({tickets,quotes,jobs,invoices,cfg,setPage,setSel}){
  const newRequests=tickets.filter(t=>t.status==="new-request").length;
  const pendingApproval=tickets.filter(t=>t.status==="awaiting-approval").length;
  const activeJobs=jobs.filter(j=>j.status==="in-progress"||j.status==="scheduled").length;
  const completedTickets=tickets.filter(t=>t.status==="completed"||t.status==="closed").length;
  const invoicesDue=invoices.filter(i=>i.status!=="paid").length;
  const som=startOfMonth();
  const revenueThisMonth=invoices.reduce((sum,inv)=>{
    const pays=(inv.payments||[]).filter(p=>new Date(p.at).getTime()>=som);
    return sum+pays.reduce((a,p)=>a+Number(p.amount||0),0);
  },0);

  const cards=[
    {l:"New Requests", v:newRequests, c:"#3B82F6", page:"tickets"},
    {l:"Pending Approval", v:pendingApproval, c:"#F59E0B", page:"tickets"},
    {l:"Active Jobs", v:activeJobs, c:"#8B5CF6", page:"jobs"},
    {l:"Completed", v:completedTickets, c:"#10B981", page:"tickets"},
    {l:"Invoices Due", v:invoicesDue, c:"#F59E0B", page:"invoices"},
    {l:"Revenue This Month", v:`R ${revenueThisMonth.toLocaleString("en-ZA",{maximumFractionDigits:0})}`, c:"#22C55E", page:"reports"},
  ];

  const recent=[...tickets].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  const todaysJobs=jobs.filter(j=>j.scheduledDate===new Date().toISOString().slice(0,10));

  return(
    <div className="page-content">
      <div className="stats-row">
        {cards.map((c,i)=>(
          <div key={i} className="stat-card" style={{cursor:"pointer"}} onClick={()=>setPage(c.page)}>
            <div className="stat-val" style={{color:c.c,fontSize:typeof c.v==="string"?16:22}}>{c.v}</div>
            <div className="stat-lbl"><span className="stat-dot" style={{background:c.c}}/>{c.l}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:16}}>
        <div className="card">
          <div className="card-header">
            <div className="card-title">Recent Tickets</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPage("tickets")}>View all →</button>
          </div>
          <div style={{padding:"0 4px"}}>
            {recent.length===0&&<div style={{padding:24,textAlign:"center",color:"var(--text4)",fontSize:13}}>No tickets yet.</div>}
            {recent.length>0&&(
              <table className="tbl">
                <thead><tr><th>Ref</th><th>Customer</th><th>Service</th><th>Status</th></tr></thead>
                <tbody>
                  {recent.map(t=>(
                    <tr key={t.ref} style={{cursor:"pointer"}} onClick={()=>{setSel(t.ref);setPage("tickets");}}>
                      <td className="mono" style={{color:AC}}>{t.ref}</td>
                      <td>{t.clientName||"—"}</td>
                      <td style={{fontSize:12}}>{SERVICES.find(s=>s.id===t.serviceType)?.label||"—"}</td>
                      <td><StagePill s={t.status}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>

        </div>

        <div className="card">

            <div className="card-title">Today's Jobs</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPage("jobs")}>Open →</button>

function TicketActions({ticket, onAction, showToast}){
  const [showCancelConfirm, setShowCancelConfirm] = useState(false);
  const [showCloseConfirm, setShowCloseConfirm] = useState(false);
  const [showPendingConfirm, setShowPendingConfirm] = useState(false);
  const [showApproveConfirm, setShowApproveConfirm] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  const handleAction = async (action, status) => {
    try {
      await fsUpdate("tickets", ticket.ref, { status, updatedAt: ts() });
      await addNoteToTicket(ticket.ref, `Ticket ${action}`, "stage", "Office");
      showToast(`✅ Ticket ${action}`);
      onAction && onAction();
    } catch(e) {
      showToast(`Failed to ${action} ticket`, "error");
    }
  };

  const handleDelete = async () => {
    try {
      await col("tickets").doc(ticket.ref).delete();
      showToast(`🗑️ Ticket ${ticket.ref} deleted`);
      onAction && onAction();
    } catch(e) {
      showToast("Failed to delete ticket", "error");
    }
  };

  if (ticket.status === "closed" || ticket.status === "cancelled") {
    return (
      <div style={{textAlign:"center", padding:"8px 0", color:"var(--text4)"}}>
        This ticket is {ticket.status}
        <button className="btn btn-danger btn-sm btn-block" style={{marginTop:8}} onClick={()=>setShowDeleteConfirm(true)}>
          🗑️ Delete Ticket
        </button>
        {showDeleteConfirm && (
          <Modal title="🗑️ Delete Ticket" onClose={()=>setShowDeleteConfirm(false)}>
            <p style={{marginBottom:12, color:"var(--text2)"}}>Delete <strong>{ticket.ref}</strong>? This cannot be undone.</p>
            <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
              <button className="btn btn-secondary" onClick={()=>setShowDeleteConfirm(false)}>Cancel</button>
              <button className="btn btn-danger" onClick={()=>{handleDelete(); setShowDeleteConfirm(false);}}>Delete</button>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  return(
    <div style={{display:"flex", flexDirection:"column", gap:6}}>
      {ticket.status !== "awaiting-approval" && ticket.status !== "paid" && ticket.status !== "closed" && ticket.status !== "cancelled" && (
        <button 
          className="btn btn-secondary btn-sm btn-block" 
          onClick={() => setShowPendingConfirm(true)}
          style={{borderColor:"#F59E0B", color:"#F59E0B"}}
        >
          ⏳ Mark Pending Approval
        </button>
      )}

      {ticket.status === "awaiting-approval" && (
        <button 
          className="btn btn-success btn-sm btn-block" 
          onClick={() => setShowApproveConfirm(true)}
        >
          ✅ Approve & Proceed
        </button>
      )}

      <button 
        className="btn btn-danger btn-sm btn-block" 
        onClick={() => setShowCancelConfirm(true)}
      >
        🚫 Cancel Ticket
      </button>

      {ticket.status === "paid" && (
        <button 
          className="btn btn-success btn-sm btn-block" 
          onClick={() => setShowCloseConfirm(true)}
        >
          ✅ Close Ticket
        </button>
      )}

      <button className="btn btn-danger btn-sm btn-block" onClick={()=>setShowDeleteConfirm(true)}>
        🗑️ Delete Ticket
      </button>

      {showPendingConfirm && (
        <Modal title="⏳ Pending Client Approval" onClose={() => setShowPendingConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Mark ticket <strong>{ticket.ref}</strong> as pending client approval?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowPendingConfirm(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={() => {handleAction("pending client approval", "awaiting-approval"); setShowPendingConfirm(false);}}>Confirm</button>
          </div>
        </Modal>
      )}

      {showApproveConfirm && (
        <Modal title="✅ Approve Ticket" onClose={() => setShowApproveConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Approve ticket <strong>{ticket.ref}</strong>?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowApproveConfirm(false)}>Cancel</button>
            <button className="btn btn-success" onClick={() => {handleAction("approved", "scheduled"); setShowApproveConfirm(false);}}>Approve</button>
          </div>
        </Modal>
      )}

      {showCancelConfirm && (
        <Modal title="🚫 Cancel Ticket" onClose={() => setShowCancelConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Cancel <strong>{ticket.ref}</strong>?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowCancelConfirm(false)}>No</button>
            <button className="btn btn-danger" onClick={() => {handleAction("cancelled", "cancelled"); setShowCancelConfirm(false);}}>Yes</button>
          </div>
        </Modal>
      )}

      {showCloseConfirm && (
        <Modal title="✅ Close Ticket" onClose={() => setShowCloseConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Close ticket <strong>{ticket.ref}</strong>?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowCloseConfirm(false)}>Cancel</button>
            <button className="btn btn-success" onClick={() => {handleAction("closed", "closed"); setShowCloseConfirm(false);}}>Close</button>
          </div>
        </Modal>
      )}

      {showDeleteConfirm && (
        <Modal title="🗑️ Delete Ticket" onClose={()=>setShowDeleteConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Delete <strong>{ticket.ref}</strong>? This cannot be undone.</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={()=>setShowDeleteConfirm(false)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>{handleDelete(); setShowDeleteConfirm(false);}}>Delete</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

════════════════════════════════════════════════════ */
function QuoteActions({quote, ticket, onAction, showToast}){
  const [showAcceptConfirm, setShowAcceptConfirm] = useState(false);
  const [showDeclineConfirm, setShowDeclineConfirm] = useState(false);

  const handleQuoteAction = async (action, status) => {
    try {
      await fsUpdate("quotes", quote.id, { status, updatedAt: ts() });
      await addNoteToTicket(ticket.ref, `Quote ${action}`, "note", "Office");
      
      if (status === "approved") {
        await fsUpdate("tickets", ticket.ref, { status: "awaiting-approval", quoteApprovedAt: ts() });
        showToast(`✅ Quote ${action} - Ticket advanced to Awaiting Approval`);
      } else {
        showToast(`✅ Quote ${action}`);
      }
      
      onAction && onAction();
    } catch(e) {
      showToast(`Failed to ${action} quote`, "error");
    }
  };

  if (!quote) return null;

  const isPending = quote.status === "draft" || quote.status === "sent";

  return(
    <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
      {isPending && (
        <>
          <button className="btn btn-success btn-sm" onClick={() => setShowAcceptConfirm(true)}>✅ Accept</button>
          <button className="btn btn-danger btn-sm" onClick={() => setShowDeclineConfirm(true)}>❌ Decline</button>
        </>
      )}
      
      {quote.status === "approved" && <span className="badge" style={{background:"rgba(34,197,94,0.15)", color:"#22C55E"}}>✅ Accepted</span>}
      {quote.status === "declined" && <span className="badge" style={{background:"rgba(239,68,68,0.15)", color:"#EF4444"}}>❌ Declined</span>}

      {showAcceptConfirm && (
        <Modal title="✅ Accept Quote" onClose={() => setShowAcceptConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Accept quote <strong>{quote.id}</strong>?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowAcceptConfirm(false)}>Cancel</button>
            <button className="btn btn-success" onClick={() => {handleQuoteAction("accepted", "approved"); setShowAcceptConfirm(false);}}>Accept</button>
          </div>
        </Modal>
      )}

      {showDeclineConfirm && (
        <Modal title="❌ Decline Quote" onClose={() => setShowDeclineConfirm(false)}>
          <p style={{marginBottom:12, color:"var(--text2)"}}>Decline quote <strong>{quote.id}</strong>?</p>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button className="btn btn-secondary" onClick={() => setShowDeclineConfirm(false)}>Cancel</button>
            <button className="btn btn-danger" onClick={() => {handleQuoteAction("declined", "declined"); setShowDeclineConfirm(false);}}>Decline</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

        <button className="btn btn-wa btn-block" onClick={()=>fire("invoiceDue",{invoiceRef:latestInvoice?.id,total:latestInvoice?.total?.toFixed(2),dueDate:latestInvoice?.dueDate,overdue:latestInvoice&&new Date(latestInvoice.dueDate)<new Date()})}>💰 Invoice Reminder</button>
        {staffList && staffList.length > 0 && (
          <div style={{borderTop:"1px solid var(--border)", paddingTop:8, marginTop:4}}>
            <div style={{fontSize:11, fontWeight:600, color:"var(--text3)", marginBottom:6}}>📤 Send Job Schedule to Staff</div>
            {staffList.map(staff => (
              <button key={staff.id} className="btn btn-secondary btn-sm btn-block" onClick={()=>sendStaffScheduled(staff.phone, staff.name, latestJob?.scheduledDate||"TBD", latestJob?.scheduledTime||"TBD", latestJob?.team||"Unassigned")}>
                👷 {staff.name} ({staff.role})
              </button>
            ))}
          </div>
        )}
      </div>
      <div className="divider"/>
      <Lbl c="Custom Message"/>
      <textarea className="field-input" style={{marginTop:6,minHeight:80}} value={custom} onChange={e=>setCustom(e.target.value)} placeholder="Type a custom message to send via WhatsApp…"/>
      <button className="btn btn-wa btn-block" style={{marginTop:8}} disabled={!custom.trim()} onClick={()=>{fire("custom",{custom});setCustom("");}}>✍️ Send Custom Message</button>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   SITE INSPECTION FORM
════════════════════════════════════════════════════ */
function SiteInspectionForm({ticket, onSave, onClose, showToast}){
  const [items, setItems] = useState(INSPECTION_ITEMS.reduce((acc,i)=>({...acc,[i]:false}), {}));
  const [notes, setNotes] = useState("");
  const [photos, setPhotos] = useState([]);
  const [inspector, setInspector] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if(!inspector.trim()){showToast("Inspector name required","error");return;}
    setSaving(true);
    const passed = Object.values(items).filter(Boolean).length;
    const total = Object.keys(items).length;
    const data = {
      ticketRef: ticket.ref,
      inspector,
      items,
      notes,
      photos,
      passed,
      total,
      status: passed === total ? "passed" : "partial",
      createdAt: ts()
    };
    await col("inspections").add(data);
    await addNoteToTicket(ticket.ref, `Inspection: ${passed}/${total} items passed`, "note", inspector);
    showToast(`✅ Inspection saved (${passed}/${total})`);
    onSave && onSave(data);
    onClose();
    setSaving(false);
  };

  return(
    <Modal title={`📸 Site Inspection — ${ticket.ref}`} onClose={onClose} wide>
      <div style={{marginBottom:12, fontSize:13, color:"var(--text2)"}}>{ticket.clientName} · {ticket.address}</div>
      
      <Field l="Inspector Name *"><input className="field-input" value={inspector} onChange={e=>setInspector(e.target.value)}/></Field>
      
      <div style={{marginTop:12, marginBottom:12}}>
        <div className="field-label" style={{marginBottom:8}}>Checklist</div>
        {INSPECTION_ITEMS.map(item => (
          <label key={item} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 0", cursor:"pointer"}}>
            <input type="checkbox" checked={items[item]} onChange={e=>setItems({...items, [item]: e.target.checked})}/>
            <span style={{fontSize:13, color:"var(--text2)"}}>{item}</span>
          </label>
        ))}
      </div>

      <Field l="Notes"><textarea className="field-input" value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="Additional inspection notes…"/></Field>
      
      <Field l="Photos"><PhotoUploader photos={photos} setPhotos={setPhotos} max={10}/></Field>

      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:16}}>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? "Saving…" : "Save Inspection"}</button>
      </div>
    </Modal>
  );
}

/* ════════════════════════════════════════════════════
   CLIENT SIGN-OFF MODAL
════════════════════════════════════════════════════ */
function ClientSignOffModal({ tickets, onSave, onClose, showToast }){
  const [selectedRef, setSelectedRef] = useState("");
  const [items, setItems] = useState(CLEANING_CHECKLIST.reduce((acc,i)=>({...acc,[i]:false}), {}));
  const [rating, setRating] = useState(0);
  const [feedback, setFeedback] = useState("");
  const [saving, setSaving] = useState(false);

  const selectedTicket = tickets.find(t => t.ref === selectedRef);

  const getSignatureData = () => {
    const canvas = document.getElementById("signoff-sig");
    if(canvas) return canvas.toDataURL("image/png");
    return null;
  };

  const save = async () => {
    if (!selectedRef) { showToast("Please select a ticket", "error"); return; }
    const done = Object.values(items).filter(Boolean).length;
    const total = Object.keys(items).length;
    if (done < total) { showToast("Please complete all checklist items", "error"); return; }
    if (!rating) { showToast("Please provide a rating", "error"); return; }
    setSaving(true);
    
    const sigData = getSignatureData();
    const data = {
      ticketRef: selectedRef,
      items,
      rating,
      feedback,
      signature: sigData,
      completedAt: ts(),
      status: "signed"
    };
    await col("signoffs").add(data);
    await addNoteToTicket(selectedRef, `Client sign-off: ${rating}★ - ${feedback || "No feedback"}`, "signoff", "Client");
    await fsUpdate("tickets", selectedRef, { status: "closed", rating, feedback, checklistItems: items });
    showToast(`✅ Sign-off complete! ${rating}★`);
    onSave && onSave(data);
    onClose();
    setSaving(false);
  };

  const completedTickets = tickets.filter(t => 
    (t.status === "completed" || t.status === "invoiced" || t.status === "paid") && 
    t.status !== "closed"
  );

  return(
    <Modal title="✅ Client Sign-Off" onClose={onClose} wide>
      <div style={{marginBottom:16}}>
        <Field l="Select Completed Ticket *">
          <select className="field-input" value={selectedRef} onChange={e => setSelectedRef(e.target.value)}>
            <option value="">— Select Ticket —</option>
            {completedTickets.map(t => (
              <option key={t.ref} value={t.ref}>
                {t.ref} — {t.clientName} ({t.status})
              </option>
            ))}
          </select>
          {selectedTicket && (
            <div style={{marginTop:8, fontSize:12, color:"var(--text3)"}}>
              {selectedTicket.clientName} · {selectedTicket.address}
            </div>
          )}
        </Field>
      </div>

      {selectedTicket && (
        <>
          <div style={{marginBottom:16}}>
            <div className="field-label" style={{marginBottom:8}}>Cleaning Checklist</div>
            {CLEANING_CHECKLIST.map(item => (
              <label key={item} style={{display:"flex", alignItems:"center", gap:8, padding:"4px 0", cursor:"pointer"}}>
                <input type="checkbox" checked={items[item]} onChange={e => setItems({...items, [item]: e.target.checked})}/>
                <span style={{fontSize:13, color:"var(--text2)"}}>{item}</span>
              </label>
            ))}
          </div>

          <div className="form-grid" style={{marginBottom:12}}>
            <Field l="Rating *">
              <StarRating value={rating} onChange={setRating}/>
            </Field>
            <Field l="Feedback">
              <textarea className="field-input" value={feedback} onChange={e => setFeedback(e.target.value)} rows={3} placeholder="Client feedback…"/>
            </Field>
          </div>

          <Field l="Client Signature">
            <div style={{border:"1px solid var(--border)", borderRadius:10, padding:8, background:"#fff"}}>
              <canvas id="signoff-sig" width="600" height="150" style={{width:"100%", touchAction:"none"}}/>
              <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={() => {
                const canvas = document.getElementById("signoff-sig");
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
              }}>🗑 Clear</button>
            </div>
          </Field>
        </>
      )}

      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:16}}>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={saving || !selectedRef}>
          {saving ? "Saving…" : "Complete Sign-Off"}
        </button>
      </div>
    </Modal>
  );
}

/* ════════════════════════════════════════════════════
   MOBILE TEAM PORTAL
════════════════════════════════════════════════════ */
function MobileTeamPortal({jobs, tickets, cfg, showToast}){
  const [teamName,setTeamName]=useState("");
  const [authenticated,setAuthenticated]=useState(false);
  const [teamJobs,setTeamJobs]=useState([]);
  const [selectedJob,setSelectedJob]=useState(null);
  const [showJobDetail,setShowJobDetail]=useState(false);

  const login=()=>{
    if(!teamName.trim()){showToast("Enter team name","error");return;}
    if(!cfg.teams.includes(teamName)){showToast("Team not found","error");return;}
    setAuthenticated(true);
    setTeamJobs(jobs.filter(j=>j.team===teamName));
  };

  const updateJobStatus = async (jobId, status) => {
    try {
      await col("jobs").doc(jobId).update({status, updatedAt: ts(), updatedBy: teamName});
      const job = jobs.find(j => j.id === jobId);
      const ticketRef = job?.ticketRef;
      
      if (ticketRef) {
        await addNoteToTicket(ticketRef, `Job status updated to ${status} by ${teamName}`, "note", teamName);
        
        if (status === "completed") {
          await fsUpdate("tickets", ticketRef, { status: "completed" });
          await addNoteToTicket(ticketRef, "✅ Job completed - ready for client sign-off", "stage", teamName);
        }
      }
      
      setTeamJobs(teamJobs.map(j => j.id === jobId ? {...j, status} : j));
      showToast(`✅ Job ${status}`);
    } catch(e) {
      showToast(`Failed to update job`, "error");
    }
  };

  if(!authenticated){
    return(
      <div className="page-content" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
        <div className="card" style={{maxWidth:400,width:"100%",padding:32}}>
          <div style={{fontSize:24,textAlign:"center",marginBottom:12}}>👷</div>
          <h2 style={{textAlign:"center",marginBottom:8}}>Team Portal</h2>
          <p style={{textAlign:"center",color:"var(--text3)",fontSize:13,marginBottom:20}}>Enter your team name to view assigned jobs</p>
          <Field l="Team Name">
            <input className="field-input" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="e.g. Team Alpha" autoFocus/>
          </Field>
          <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={login}>Login →</button>
        </div>
      </div>
    );
  }

  if(showJobDetail && selectedJob){
    const ticket=tickets.find(t=>t.ref===selectedJob.ticketRef);
    return(
      <div className="page-content">
        <button className="btn btn-secondary btn-sm" style={{marginBottom:16}} onClick={()=>setShowJobDetail(false)}>← Back to jobs</button>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header">
            <div className="card-title">{selectedJob.ticketRef}</div>
            <StagePill s={selectedJob.status}/>
          </div>
          <div className="card-body">
            <div className="detail-row"><div className="detail-key">Client</div><div className="detail-val">{ticket?.clientName||"—"}</div></div>
            <div className="detail-row"><div className="detail-key">Address</div><div className="detail-val">{ticket?.address||"—"}</div></div>
            <div className="detail-row"><div className="detail-key">Service</div><div className="detail-val">{ticket?.serviceType||"—"}</div></div>
            <div className="detail-row"><div className="detail-key">Time</div><div className="detail-val">{selectedJob.scheduledTime||"—"}</div></div>
            <div className="detail-row"><div className="detail-key">Notes</div><div className="detail-val">{selectedJob.notes||"—"}</div></div>
          </div>
        </div>

        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><div className="card-title">📸 Photos</div></div>
          <div className="card-body">
            <PhotoUploader 
              photos={selectedJob.photos||[]} 
              setPhotos={async(photos)=>{
                setSelectedJob({...selectedJob,photos});
                await col("jobs").doc(selectedJob.id).update({photos});
              }} 
            />
          </div>
        </div>

        <div className="card">
          <div className="card-header"><div className="card-title">⚡ Actions</div></div>
          <div className="card-body" style={{display:"flex",flexDirection:"column",gap:8}}>
            {selectedJob.status==="scheduled"&&(
              <button className="btn btn-primary btn-block" onClick={()=>updateJobStatus(selectedJob.id,"in-progress")}>▶️ Start Job</button>
            )}
            {selectedJob.status==="in-progress"&&(
              <button className="btn btn-primary btn-block" onClick={()=>updateJobStatus(selectedJob.id,"completed")}>✅ Complete Job</button>
            )}
            <button className="btn btn-secondary btn-block" onClick={()=>{
              const msg=`Hi, I'm from ${teamName} at ${ticket?.address||"your property"}. We're starting the cleaning work now.`;
              window.open(waUrl(ticket?.phone,msg),"_blank");
            }}>💬 Contact Client</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="page-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:18}}>👷 {teamName}</h2>
        <button className="btn btn-secondary btn-sm" onClick={()=>setAuthenticated(false)}>Logout</button>
      </div>

      <div className="stats-row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <div className="stat-card"><div className="stat-val" style={{color:"#8B5CF6"}}>{teamJobs.filter(j=>j.status==="scheduled").length}</div><div className="stat-lbl">Scheduled</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#06B6D4"}}>{teamJobs.filter(j=>j.status==="in-progress").length}</div><div className="stat-lbl">In Progress</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#10B981"}}>{teamJobs.filter(j=>j.status==="completed").length}</div><div className="stat-lbl">Completed</div></div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">Your Jobs</div></div>
        <div className="card-body">
          {teamJobs.length===0?<div style={{textAlign:"center",color:"var(--text4)",padding:24}}>No jobs assigned yet.</div>:
            teamJobs.map(j=>{
              const t=tickets.find(tk=>tk.ref===j.ticketRef);
              return(
                <div key={j.id} className="job-row" style={{cursor:"pointer"}} onClick={()=>{setSelectedJob(j);setShowJobDetail(true);}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,color:"var(--text)"}}>{j.ticketRef}</div>
                    <div style={{fontSize:12,color:"var(--text3)"}}>{t?.clientName||"—"} · {j.scheduledDate}</div>
                  </div>
                  <StagePill s={j.status}/>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

/* ── TICKET DETAIL (UPDATED WITH FIELD DATA) ── */
function TicketDetail({ticket, tickets, quotes, jobs, invoices, inspections, signoffs, cfg, onBack, showToast, setPage, setSel, staffList}){
  const [showQuoteBuilder,setShowQuoteBuilder]=useState(false);
  const [showScheduleJob,setShowScheduleJob]=useState(false);
  const [showInvoiceBuilder,setShowInvoiceBuilder]=useState(false);
  const [showWAPanel,setShowWAPanel]=useState(false);
  const [showInspectionForm,setShowInspectionForm]=useState(false);
  const [showSignoffModal,setShowSignoffModal]=useState(false);
  const [localTicket,setLocalTicket]=useState(ticket);
  const [newNote,setNewNote]=useState("");
  const [savingNote,setSavingNote]=useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const [editingField, setEditingField] = useState(null);
  const [editValue, setEditValue] = useState("");
  
  // Field data from Smart Inspection
  const [assessments, setAssessments] = useState([]);
  const [fieldSignoffs, setFieldSignoffs] = useState([]);
  const [checkins, setCheckins] = useState([]);

  // Fetch field data for this ticket
  useEffect(() => {
    if(!ticket?.ref) return;
    const unsub1 = col("assessments").where("ticketRef", "==", ticket.ref).onSnapshot(snap => setAssessments(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub2 = col("signoffs").where("ticketRef", "==", ticket.ref).onSnapshot(snap => setFieldSignoffs(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub3 = col("checkins").where("ticketRef", "==", ticket.ref).orderBy("timestamp", "desc").onSnapshot(snap => setCheckins(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { unsub1(); unsub2(); unsub3(); };
  }, [ticket?.ref]);

  const ticketQuotes=(quotes||[]).filter(q=>q.ticketRef===localTicket?.ref);
  const ticketJobs=(jobs||[]).filter(j=>j.ticketRef===localTicket?.ref);
  const ticketInvoices=(invoices||[]).filter(i=>i.ticketRef===localTicket?.ref);
  const ticketInspections=(inspections||[]).filter(i=>i.ticketRef===localTicket?.ref);
  const ticketSignoffs=(signoffs||[]).filter(s=>s.ticketRef===localTicket?.ref);
  const latestQuote=ticketQuotes.length?ticketQuotes.reduce((a,b)=>new Date(a.createdAt)>new Date(b.createdAt)?a:b):null;
  const latestJob=ticketJobs.length?ticketJobs.reduce((a,b)=>new Date(a.createdAt)>new Date(b.createdAt)?a:b):null;
  const latestInvoice=ticketInvoices.length?ticketInvoices.reduce((a,b)=>new Date(a.createdAt)>new Date(b.createdAt)?a:b):null;

  // Check if we have field data
  const hasFieldData = assessments.length > 0 || fieldSignoffs.length > 0 || checkins.length > 0;

  if(!localTicket) return <div className="page-content"><div style={{textAlign:"center",padding:40,color:"var(--text4)"}}>Ticket not found.</div></div>;

  const refreshTicket = async () => {
    const snap = await col("tickets").doc(localTicket.ref).get();
    if(snap.exists) setLocalTicket({...snap.data()});
    setRefreshKey(k => k + 1);
  };

  const updateField=async(k,v)=>{
    const changes={[k]:v,updatedAt:ts()};
    await fsUpdate("tickets",localTicket.ref,changes);
    setLocalTicket({...localTicket,[k]:v});
    showToast(`Updated ${k}`);
  };

  const startEdit = (field, value) => {
    setEditingField(field);
    setEditValue(value || "");
  };

  const saveEdit = async () => {
    if (editingField) {
      await updateField(editingField, editValue);
      setEditingField(null);
      setEditValue("");
    }
  };

  const advanceStage=async(k)=>{
    const idx=STAGES.findIndex(s=>s.k===k);
    if(idx<0)return;
    const currentIdx=STAGES.findIndex(s=>s.k===localTicket.status);
    if(idx<currentIdx)return;
    await updateField("status",k);
    await addNoteToTicket(localTicket.ref,`Stage moved to ${ST[k].l}`,"stage",cfg.shortName);
    if(NOTIFY_STAGES.includes(k) && localTicket.phone){
      const msg=buildWaMsg(k,localTicket,cfg,{
        quoteRef:latestQuote?.id,
        total:latestQuote?.total?.toFixed(2),
        date:latestJob?.scheduledDate,
        time:latestJob?.scheduledTime,
        team:latestJob?.team,
        invoiceRef:latestInvoice?.id,
        dueDate:latestInvoice?.dueDate
      });
      if(msg) setTimeout(()=>{
        window.open(waUrl(localTicket.phone,msg),"_blank");
        logWA(localTicket.ref,k,localTicket.phone,msg,"Office");
      },200);
    }
    showToast(`Stage: ${ST[k].l}`);
  };

  const addNote=async()=>{
    if(!newNote.trim())return;
    setSavingNote(true);
    await addNoteToTicket(localTicket.ref,newNote,"note",cfg.shortName);
    setLocalTicket({...localTicket,notes:[...(localTicket.notes||[]),{txt:newNote,at:ts(),type:"note",author:cfg.shortName}]});
    setNewNote("");
    setSavingNote(false);
    showToast("Note added ✓");
  };

  const stageIdx=STAGES.findIndex(s=>s.k===localTicket.status);
  const progress=stageIdx>=0?Math.round((stageIdx/(STAGES.length-1))*100):0;

  const canSignoff = localTicket.status === "completed" || localTicket.status === "invoiced" || localTicket.status === "paid";

  const renderEditableField = (label, field, value, type="text", options=[]) => {
    const isEditing = editingField === field;
    return (
      <div className="detail-row">
        <div className="detail-key">{label}</div>
        <div className="detail-val" style={{display:"flex", gap:8, alignItems:"center"}}>
          {isEditing ? (
            <>
              {type === "select" ? (
                <select className="field-input" style={{flex:1}} value={editValue} onChange={e=>setEditValue(e.target.value)}>
                  {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
              ) : type === "textarea" ? (
                <textarea className="field-input" style={{flex:1}} value={editValue} onChange={e=>setEditValue(e.target.value)} rows={2}/>
              ) : (
                <input className="field-input" style={{flex:1}} value={editValue} onChange={e=>setEditValue(e.target.value)}/>
              )}
              <button className="btn btn-primary btn-xs" onClick={saveEdit}>💾</button>
              <button className="btn btn-secondary btn-xs" onClick={()=>{setEditingField(null);setEditValue("");}}>✕</button>
            </>
          ) : (
            <>
              <span>{value || "—"}</span>
              <button className="btn btn-ghost btn-xs" onClick={()=>startEdit(field, value)}>✏️</button>
            </>
          )}
        </div>
      </div>
    );
  };

  const renderFieldData = () => {
    if(!hasFieldData) return <div className="text-muted" style={{padding:"8px 0"}}>No field data collected yet.</div>;
    
    let html = [];
    
    // Check-ins
    if(checkins.length > 0){
      html.push(<div key="checkins" style={{marginBottom:12}}>
        <div style={{fontSize:11, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:4}}>📍 Check-In / Out</div>
        {checkins.map(c => (
          <div key={c.id} style={{display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:"1px solid var(--border)", fontSize:12}}>
            <span>{c.type === "checkin" ? "📥 Check In" : "📤 Check Out"}</span>
            <span style={{color:"var(--text3)"}}>{c.timestamp ? new Date(c.timestamp).toLocaleString() : ""}</span>
            {c.verified && <span className="field-data-badge gps">✅ GPS Verified</span>}
          </div>
        ))}
      </div>);
    }
    
    // SLAM
    if(assessments.length > 0){
      const slam = assessments[0];
      const damaged = Object.entries(slam.items||{}).filter(([k,v])=>v===false).map(([k])=>k);
      html.push(<div key="slam" style={{marginBottom:12}}>
        <div style={{fontSize:11, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:4}}>📋 SLAM Assessment</div>
        <div style={{fontSize:12, color:"var(--text2)"}}>
          {damaged.length > 0 ? (
            <span style={{color:"#EF4444"}}>⚠️ Damaged/Missing: {damaged.join(", ")}</span>
          ) : <span className="text-green">✅ All items in good condition</span>}
        </div>
        {slam.notes && <div style={{fontSize:12, color:"var(--text3)"}}>📝 {slam.notes}</div>}

function LineItemsEditor({lineItems,setLineItems,cfg}){
  const update=(i,k,v)=>setLineItems(li=>li.map((it,j)=>j===i?{...it,[k]:v}:it));
  const subtotal=lineItems.reduce((a,it)=>a+(Number(it.qty||0)*Number(it.unitCost||0)),0);
  const vat=subtotal*(cfg.vatRate/100);
  const total=subtotal+vat;
  return(
    <div>
      <table className="line-tbl">
        <thead><tr><th style={{width:110}}>Category</th><th>Description</th><th style={{width:60}}>Qty</th><th style={{width:100}}>Unit Cost</th><th style={{width:100}}>Total</th><th style={{width:30}}></th></tr></thead>
        <tbody>
          {lineItems.map((it,i)=>(
            <tr key={i}>
              <td><select className="field-input" style={{padding:"6px 8px",fontSize:12}} value={it.type} onChange={e=>update(i,"type",e.target.value)}>{QUOTE_LINE_TYPES.map(t=><option key={t}>{t}</option>)}</select></td>
              <td><input value={it.desc} onChange={e=>update(i,"desc",e.target.value)} placeholder="Description"/></td>
              <td><input type="number" min="0" value={it.qty} onChange={e=>update(i,"qty",e.target.value)}/></td>
              <td><input type="number" min="0" value={it.unitCost} onChange={e=>update(i,"unitCost",e.target.value)}/></td>
              <td style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:"var(--text2)",padding:"6px 8px"}}>R {(Number(it.qty||0)*Number(it.unitCost||0)).toFixed(2)}</td>
              <td><button className="btn btn-ghost btn-xs" onClick={()=>setLineItems(li=>li.filter((_,j)=>j!==i))}>✕</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <button className="btn btn-secondary btn-sm" onClick={()=>setLineItems(li=>[...li,{type:"Labour",desc:"",qty:1,unitCost:0}])}>+ Add Line Item</button>
      <div className="totals-box" style={{marginTop:14}}>
        <div className="totals-row"><span>Subtotal</span><span>R {subtotal.toFixed(2)}</span></div>
        <div className="totals-row"><span>VAT ({cfg.vatRate}%)</span><span>R {vat.toFixed(2)}</span></div>
        <div className="totals-row grand"><span>Total</span><span>R {total.toFixed(2)}</span></div>
      </div>
    </div>
  );
}

function QuoteBuilderModal({ticket,cfg,onClose,onSaved,showToast}){
  const [lineItems,setLineItems]=useState([{type:"Labour",desc:"General cleaning labour",qty:1,unitCost:0}]);
  const [saved,setSaved]=useState(null);
  const [saving,setSaving]=useState(false);

  const totals=()=>{
    const subtotal=lineItems.reduce((a,it)=>a+(Number(it.qty||0)*Number(it.unitCost||0)),0);
    const vat=subtotal*(cfg.vatRate/100);
    return{subtotal,vat,total:subtotal+vat};
  };

  const save=async(status)=>{
    setSaving(true);
    try{
      const {subtotal,vat,total}=totals();
      let doc=saved;
      if(!doc){
        const {n,year}=await nextNumber("quote");
        const ref=makeQuoteRef(year,n);
        doc={id:ref,ticketRef:ticket.ref,clientName:ticket.clientName,phone:ticket.phone,address:ticket.address,createdAt:ts()};
        await col("quotes").doc(ref).set({...doc,lineItems,subtotal,vat,total,status});
      }else{
        await col("quotes").doc(doc.id).update({lineItems,subtotal,vat,total,status,updatedAt:ts()});
      }
      const fullDoc={...doc,lineItems,subtotal,vat,total,status};
      setSaved(fullDoc);
      await fsUpdate("tickets",ticket.ref,{quoteRef:fullDoc.id,status:STAGES.findIndex(s=>s.k===ticket.status)<STAGES.findIndex(s=>s.k==="quotation")?"quotation":ticket.status});
      showToast(`Quotation ${fullDoc.id} saved ✓`);
      onSaved&&onSaved(fullDoc);
    }catch(e){console.error(e);showToast("Failed to save quotation","error");}
    setSaving(false);
  };

  const sendWA=async()=>{
    if(!saved)return;
    const msg=buildWaMsg("quoteReady",ticket,cfg,{quoteRef:saved.id,total:saved.total.toFixed(2)});
    window.open(waUrl(ticket.phone,msg),"_blank");
    await logWA(ticket.ref,"quoteReady",ticket.phone,msg,"Office");
    await fsUpdate("quotes",saved.id,{status:"sent"});
    setSaved(s=>({...s,status:"sent"}));
    showToast("WhatsApp opened — quote marked as sent ✓");
  };

  return(
    <Modal title={`📝 Quote Builder — ${ticket.ref}`} onClose={onClose} wide>
      <div style={{marginBottom:14,fontSize:12,color:"var(--text3)"}}>{ticket.clientName} · {ticket.phone} · {ticket.address||"No address on file"}</div>
      <LineItemsEditor lineItems={lineItems} setLineItems={setLineItems} cfg={cfg}/>
      <div className="divider"/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {saved&&<button className="btn btn-pdf btn-sm" onClick={()=>openPrintWindow(buildQuotePdfHtml(saved,cfg))}>🖨️ Print / PDF</button>}
        {saved&&ticket.phone&&<button className="btn btn-wa btn-sm" onClick={sendWA}>💬 Send via WhatsApp</button>}
        <button className="btn btn-secondary" onClick={()=>save("draft")} disabled={saving}>{saving?"Saving…":saved?"Update Draft":"Save Draft"}</button>
        <button className="btn btn-primary" onClick={()=>save(saved?.status||"draft")} disabled={saving}>{saved?"✓ Saved — Update":"Save Quotation"}</button>
      </div>
      {saved&&<div style={{marginTop:10,fontSize:12,color:AC}}>✓ Saved as {saved.id} <QuoteStatusPill s={saved.status}/></div>}
    </Modal>
  );
}

/* ── SCHEDULE JOB MODAL ── */
function ScheduleJobModal({ticket,tickets,cfg,onClose,onSaved,showToast,defaultDate}){
  const [ticketRef,setTicketRef]=useState(ticket?.ref||"");
  const [date,setDate]=useState(defaultDate||new Date().toISOString().slice(0,10));
  const [time,setTime]=useState("09:00");
  const [team,setTeam]=useState(cfg.teams[0]||"");
  const [address,setAddress]=useState(ticket?.address||"");
  const [saving,setSaving]=useState(false);
  const pickedTicket=ticket||tickets?.find(t=>t.ref===ticketRef);

  useEffect(() => {
    if(pickedTicket?.address) setAddress(pickedTicket.address);
  }, [pickedTicket]);

  const save=async()=>{
    if(!ticketRef){showToast("Select a ticket first","error");return;}
    setSaving(true);
    try{
      const jobData = {
        ticketRef,
        scheduledDate: date,
        scheduledTime: time,
        team,
        address: address || pickedTicket?.address || "",
        status: "scheduled",
        createdAt: ts(),
        updatedAt: ts(),
        source: "main_portal"
      };
      const ref = await col("jobs").add(jobData);
      await fsUpdate("tickets", ticketRef, { 
        status: "scheduled", 
        assignedTeam: team,
        jobId: ref.id,
        scheduledDate: date,
        scheduledTime: time
      });
      await addNoteToTicket(ticketRef, `Job scheduled for ${date} at ${time} with ${team}`, "stage", "Office");
      showToast(`✅ Job scheduled for ${team} on ${date}`);
      onSaved && onSaved({id:ref.id, ...jobData});
      onClose();
    }catch(e){console.error(e);showToast("Failed to schedule job","error");}
    setSaving(false);
  };

  return(
    <Modal title="📅 Schedule Job" onClose={onClose}>
      {!ticket&&(
        <Field l="Ticket *" span>
          <select className="field-input" value={ticketRef} onChange={e=>{
            setTicketRef(e.target.value);
            const t = tickets?.find(tk=>tk.ref===e.target.value);
            if(t?.address) setAddress(t.address);
          }}>
            <option value="">— Select ticket —</option>
            {(tickets||[]).map(t=><option key={t.ref} value={t.ref}>{t.ref} — {t.clientName}</option>)}
          </select>
        </Field>
      )}
      {pickedTicket&&<div style={{marginBottom:12,fontSize:12,color:"var(--text3)"}}>{pickedTicket.clientName} · {pickedTicket.address||"No address"}</div>}
      <div className="form-grid">
        <Field l="Date *"><input type="date" className="field-input" value={date} onChange={e=>setDate(e.target.value)}/></Field>
        <Field l="Time"><input type="time" className="field-input" value={time} onChange={e=>setTime(e.target.value)}/></Field>
        <Field l="Team" span>
          <select className="field-input" value={team} onChange={e=>setTeam(e.target.value)}>
            {cfg.teams.map(tm=><option key={tm}>{tm}</option>)}
          </select>
        </Field>
        <Field l="Address" span>
          <textarea className="field-input" value={address} onChange={e=>setAddress(e.target.value)} rows={2} placeholder="Property address"/>
        </Field>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?"Scheduling…":"Schedule Job"}</button>
      </div>
    </Modal>
  );
}

/* ── INVOICE BUILDER MODAL ── */
function InvoiceBuilderModal({ticket,quote,cfg,onClose,onSaved,showToast}){
  const [lineItems,setLineItems]=useState(quote?.lineItems?.map(li=>({...li}))||[{type:"Labour",desc:"Cleaning service rendered",qty:1,unitCost:0}]);
  const [dueDate,setDueDate]=useState(new Date(Date.now()+7*86400000).toISOString().slice(0,10));
  const [saved,setSaved]=useState(null);
  const [saving,setSaving]=useState(false);
  const [payAmt,setPayAmt]=useState("");

  const totals=()=>{
    const subtotal=lineItems.reduce((a,it)=>a+(Number(it.qty||0)*Number(it.unitCost||0)),0);
    const vat=subtotal*(cfg.vatRate/100);
    return{subtotal,vat,total:subtotal+vat};
  };

  const save=async()=>{
    setSaving(true);
    try{
      const {subtotal,vat,total}=totals();
      let doc=saved;
      if(!doc){
        const {n,year}=await nextNumber("invoice");
        const ref=makeInvoiceRef(year,n);
        doc={id:ref,ticketRef:ticket.ref,quoteRef:quote?.id||ticket.quoteRef||"",clientName:ticket.clientName,phone:ticket.phone,address:ticket.address,createdAt:ts(),payments:[],amountPaid:0};
        await col("invoices").doc(ref).set({...doc,lineItems,subtotal,vat,total,dueDate,status:"draft"});
      }else{
        await col("invoices").doc(doc.id).update({lineItems,subtotal,vat,total,dueDate,updatedAt:ts()});
      }
      const fullDoc={...doc,lineItems,subtotal,vat,total,dueDate,status:doc.status||"draft"};
      setSaved(fullDoc);
      await fsUpdate("tickets",ticket.ref,{invoiceRef:fullDoc.id,status:"invoiced"});
      showToast(`Invoice ${fullDoc.id} saved ✓`);
      onSaved&&onSaved(fullDoc);
    }catch(e){console.error(e);showToast("Failed to save invoice","error");}
    setSaving(false);
  };

  const markSent=async()=>{
    await fsUpdate("invoices",saved.id,{status:"sent"});
    setSaved(s=>({...s,status:"sent"}));
    showToast("Marked as sent ✓");
  };

  const recordPayment=async()=>{
    const amt=Number(payAmt);
    if(!amt||amt<=0)return;
    const payments=[...(saved.payments||[]),{amount:amt,at:ts()}];
    const amountPaid=payments.reduce((a,p)=>a+p.amount,0);
    const status=amountPaid>=saved.total?"paid":"partial";
    const changes={payments,amountPaid,status};
    if(status==="paid")changes.paidAt=ts();
    await fsUpdate("invoices",saved.id,changes);
    setSaved(s=>({...s,...changes}));
    setPayAmt("");
    if(status==="paid")await fsUpdate("tickets",ticket.ref,{status:"paid"});
    showToast(status==="paid"?"Invoice fully paid ✓":"Payment recorded ✓");
  };

  const sendWA=async()=>{
    if(!saved)return;
    const msg=buildWaMsg("invoiceDue",ticket,cfg,{invoiceRef:saved.id,total:saved.total.toFixed(2),dueDate:saved.dueDate,overdue:new Date(saved.dueDate)<new Date()});
    window.open(waUrl(ticket.phone,msg),"_blank");
    await logWA(ticket.ref,"invoiceDue",ticket.phone,msg,"Office");
    showToast("WhatsApp opened ✓");
  };

  return(
    <Modal title={`💰 Invoice Builder — ${ticket.ref}`} onClose={onClose} wide>
      <div style={{marginBottom:14,fontSize:12,color:"var(--text3)"}}>{ticket.clientName} · {ticket.phone} · {ticket.address||"No address on file"}</div>
      {quote&&!saved&&<div style={{marginBottom:10,fontSize:11,color:AC}}>✓ Line items copied from quotation {quote.id}</div>}
      <LineItemsEditor lineItems={lineItems} setLineItems={setLineItems} cfg={cfg}/>
      <div className="form-grid" style={{marginTop:12,maxWidth:240}}>
        <Field l="Due Date"><input type="date" className="field-input" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></Field>
      </div>
      <div className="divider"/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {saved&&<button className="btn btn-pdf btn-sm" onClick={()=>openPrintWindow(buildInvoicePdfHtml(saved,cfg))}>🖨️ Print / PDF</button>}
        {saved&&saved.status==="draft"&&<button className="btn btn-secondary btn-sm" onClick={markSent}>📤 Mark as Sent</button>}
        {saved&&ticket.phone&&<button className="btn btn-wa btn-sm" onClick={sendWA}>💬 Send Reminder</button>}
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?"Saving…":saved?"Update Invoice":"Save Invoice"}</button>
      </div>
      {saved&&(
        <div style={{marginTop:14,background:"var(--bg3)",borderRadius:10,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,color:"var(--text2)"}}>✓ Saved as <strong style={{color:AC}}>{saved.id}</strong></span>
            <InvStatusPill s={saved.status}/>
          </div>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>Paid so far: R {Number(saved.amountPaid||0).toFixed(2)} / R {Number(saved.total||0).toFixed(2)}</div>
          {saved.status!=="paid"&&(
            <div style={{display:"flex",gap:6}}>
              <input className="field-input" type="number" placeholder="Amount received" value={payAmt} onChange={e=>setPayAmt(e.target.value)} style={{flex:1}}/>
              <button className="btn btn-primary btn-sm" onClick={recordPayment}>Record Payment</button>
            </div>
          )}
        </div>
      )}
    </Modal>
  );
}

/* ── ENHANCED SCHEDULING ── */
function EnhancedScheduling({jobs, tickets, cfg, showToast, setPage}){
  const [view,setView]=useState("week");
  const [selectedDate,setSelectedDate]=useState(new Date());
  const [dragJob,setDragJob]=useState(null);
  const [showAssignModal,setShowAssignModal]=useState(false);
  const [selectedJob,setSelectedJob]=useState(null);

  const getWeekDays=()=>{
    const start=new Date(selectedDate);
    start.setDate(start.getDate()-start.getDay());
    return Array.from({length:7},(_,i)=>{
      const d=new Date(start);
      d.setDate(d.getDate()+i);
      return d;
    });
  };

  const jobsByDate=(dateStr)=>jobs.filter(j=>j.scheduledDate===dateStr);

  const handleDragStart=(j,e)=>{
    setDragJob(j);
    e.dataTransfer.effectAllowed="move";
  };

  const handleDrop=(dateStr,e)=>{
    e.preventDefault();
    if(!dragJob)return;
    const targetJobs=jobsByDate(dateStr);
    const conflict=targetJobs.some(j=>j.team===dragJob.team && j.id!==dragJob.id);
    if(conflict){
      showToast("⚠️ Team conflict on this date!","error");
      return;
    }
    col("jobs").doc(dragJob.id).update({scheduledDate:dateStr,updatedAt:ts()});
    showToast(`📅 Moved job to ${dateStr}`);
    setDragJob(null);
  };

  const assignTeam=async(jobId,team)=>{
    await col("jobs").doc(jobId).update({team,assignedAt:ts(),assignedBy:"Office"});
    await addJobNote(jobId,selectedJob?.ticketRef,`Assigned to ${team}`,"assignment","Office");
    showToast(`👷 Assigned to ${team}`);
    setShowAssignModal(false);
  };

  return(
    <div className="page-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>{const d=new Date(selectedDate);d.setDate(d.getDate()-7);setSelectedDate(d);}}>←</button>
          <span style={{fontWeight:700,color:"var(--text)"}}>{selectedDate.toLocaleDateString("en-ZA",{month:"long",year:"numeric"})}</span>
          <button className="btn btn-secondary btn-sm" onClick={()=>{const d=new Date(selectedDate);d.setDate(d.getDate()+7);setSelectedDate(d);}}>→</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSelectedDate(new Date())}>Today</button>
        </div>
        <div className="cal-toggle">
          <button className={view==="week"?"active":""} onClick={()=>setView("week")}>Week</button>
          <button className={view==="month"?"active":""} onClick={()=>setView("month")}>Month</button>
        </div>
      </div>

      {view==="week"?(
        <div className="week-grid">
          {getWeekDays().map((d,i)=>{
            const ds=d.toISOString().slice(0,10);
            const dayJobs=jobsByDate(ds);
            const isToday=ds===new Date().toISOString().slice(0,10);
            return(
              <div key={i} className={`week-day${isToday?" today":""}`} onDragOver={e=>e.preventDefault()} onDrop={e=>handleDrop(ds,e)}>
                <div className="week-day-head">{d.toLocaleDateString("en-ZA",{weekday:"short"})} <span className="wd-date">{d.getDate()}</span> <span style={{fontSize:9,color:"var(--text4)",marginLeft:4}}>{dayJobs.length}</span></div>
                <div className="week-day-body">
                  {dayJobs.map(j=>{
                    const t=tickets.find(tk=>tk.ref===j.ticketRef);
                    return(
                      <div key={j.id} className="job-card" draggable onDragStart={e=>handleDragStart(j,e)} style={{borderLeftColor:j.status==="in-progress"?"#06B6D4":j.status==="completed"?"#10B981":"#8B5CF6"}} onClick={()=>{setSelectedJob(j);setShowAssignModal(true);}}>
                        <div className="jc-ref">{j.ticketRef}</div>
                        <div className="jc-name">{t?.clientName||"Unknown"}</div>
                        <div className="jc-team">👷 {j.team||"Unassigned"} · {j.scheduledTime||""}</div>
                      </div>
                    );
                  })}
                  <button className="btn btn-ghost btn-xs" style={{marginTop:4,color:"var(--text4)"}} onClick={()=>setPage("tickets")}>+ Add job</button>
                </div>
              </div>
            );
          })}
        </div>
      ):(
        <div className="month-grid">
          {Array.from({length:new Date(selectedDate.getFullYear(),selectedDate.getMonth()+1,0).getDate()},(_,i)=>{
            const d=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),i+1);
            const ds=d.toISOString().slice(0,10);
            const dayJobs=jobsByDate(ds);
            const isToday=ds===new Date().toISOString().slice(0,10);
            return(
              <div key={i} className={`month-cell${isToday?" today":""}`}>
                <div className="mc-num">{d.getDate()}</div>
                {dayJobs.length>0&&<span className="mc-count">{dayJobs.length}</span>}
              </div>
            );
          })}
        </div>
      )}

      {showAssignModal&&selectedJob&&(
        <Modal title="👷 Assign Team" onClose={()=>setShowAssignModal(false)}>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:13,color:"var(--text2)"}}>Job: {selectedJob.ticketRef}</div>
            <div style={{fontSize:12,color:"var(--text3)"}}>Current: {selectedJob.team||"Unassigned"}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {cfg.teams.map(t=><button key={t} className="btn btn-secondary btn-block" onClick={()=>assignTeam(selectedJob.id,t)}>{t} {selectedJob.team===t&&"✓"}</button>)}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── NEW TICKET MODAL ── */
function NewTicketModal({onClose,onSaved,cfg,showToast}){
  const [form,setForm]=useState({clientName:"",phone:"",email:"",company:"",propertyType:"",address:"",serviceType:"",priority:"Normal",requestedDate:""});
  const [loading,setLoading]=useState(false);

  const save=async()=>{
    if(!form.clientName.trim()){showToast("Client name is required","error");return;}
    if(!form.phone.trim()){showToast("Phone number is required","error");return;}
    if(!form.serviceType){showToast("Service type is required","error");return;}
    setLoading(true);
    try{
      await upsertCustomer(form);
      const {n,year}=await nextNumber("ticket");
      const ref=makeTicketRef(year,n);
      const doc={ref,clientName:form.clientName,phone:form.phone,email:form.email,company:form.company,propertyType:form.propertyType,address:form.address,serviceType:form.serviceType,priority:form.priority||"Normal",requestedDate:form.requestedDate,status:"new-request",notes:[],createdAt:ts(),updatedAt:ts()};
      await col("tickets").doc(ref).set(doc);
      await addNoteToTicket(ref,"Ticket created","stage",cfg.shortName);
      showToast(`Ticket ${ref} created ✓`);
      onSaved&&onSaved(doc);
      onClose();
    }catch(e){console.error(e);showToast("Failed to create ticket","error");}
    setLoading(false);
  };

  return(
    <Modal title="🎫 New Cleaning Ticket" onClose={onClose} wide>
      <div className="form-grid">
        <Field l="Client Name *"><input className="field-input" value={form.clientName} onChange={e=>setForm({...form,clientName:e.target.value})} placeholder="Full name"/></Field>
        <Field l="Phone *"><input className="field-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="e.g. 0821234567"/></Field>
        <Field l="Email"><input className="field-input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@example.com"/></Field>
        <Field l="Company"><input className="field-input" value={form.company} onChange={e=>setForm({...form,company:e.target.value})} placeholder="Company name"/></Field>
        <Field l="Property Type"><select className="field-input" value={form.propertyType} onChange={e=>setForm({...form,propertyType:e.target.value})}><option value="">— Select —</option>{PROPERTY_TYPES.map(t=><option key={t}>{t}</option>)}</select></Field>
        <Field l="Service *"><select className="field-input" value={form.serviceType} onChange={e=>setForm({...form,serviceType:e.target.value})}><option value="">— Select —</option>{SERVICES.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}</select></Field>
        <Field l="Priority"><select className="field-input" value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></Field>
        <Field l="Requested Date"><input type="date" className="field-input" value={form.requestedDate} onChange={e=>setForm({...form,requestedDate:e.target.value})}/></Field>
        <Field l="Address" span><textarea className="field-input" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="Property address" rows={2}/></Field>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?"Creating…":"Create Ticket"}</button>
      </div>
    </Modal>
  );
}

/* ── TICKETS PAGE ── */
function TicketsPage({tickets, quotes, jobs, invoices, inspections, signoffs, cfg, setPage, setSel, showToast, selTicket, staffList}){
  const [filterStage,setFilterStage]=useState("");
  const [filterService,setFilterService]=useState("");
  const [search,setSearch]=useState("");
  const [showNewModal,setShowNewModal]=useState(false);
  const [selectedRef,setSelectedRef]=useState(selTicket||null);

  const filtered=tickets.filter(t=>{
    if(filterStage && t.status!==filterStage)return false;
    if(filterService && t.serviceType!==filterService)return false;
    if(search && !t.ref.toLowerCase().includes(search.toLowerCase()) && !(t.clientName||"").toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const selectedTicket=selectedRef?tickets.find(t=>t.ref===selectedRef):null;
  if(selectedTicket){
    return(
      <TicketDetail ticket={selectedTicket} tickets={tickets} quotes={quotes} jobs={jobs} invoices={invoices} inspections={inspections} signoffs={signoffs} cfg={cfg} onBack={()=>setSelectedRef(null)} showToast={showToast} setPage={setPage} setSel={setSel} staffList={staffList}/>
    );
  }

  return(
    <div className="page-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          <div className="searchbar" style={{width:220}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tickets…"/></div>
          <select className="field-input" style={{width:140,padding:"8px 10px"}} value={filterStage} onChange={e=>setFilterStage(e.target.value)}><option value="">All Stages</option>{STAGES.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}</select>
          <select className="field-input" style={{width:150,padding:"8px 10px"}} value={filterService} onChange={e=>setFilterService(e.target.value)}><option value="">All Services</option>{SERVICES.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}</select>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowNewModal(true)}>+ New Ticket</button>
      </div>

      <div className="stage-stepper" style={{marginBottom:16}}>
        <button className={`stage-pill${!filterStage?" active":""}`} style={{borderColor:!filterStage?AC:"var(--border)"}} onClick={()=>setFilterStage("")}>All</button>
        {STAGES.map(s=>(<button key={s.k} className={`stage-pill${filterStage===s.k?" active":""}`} style={{borderColor:filterStage===s.k?AC:"var(--border)"}} onClick={()=>setFilterStage(s.k)}><span className="sp-dot" style={{background:s.c}}/>{s.l}</button>))}
      </div>

      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Ref</th><th>Customer</th><th>Service</th><th>Property</th><th>Priority</th><th>Status</th><th>Created</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="7" style={{textAlign:"center",padding:32,color:"var(--text4)"}}>No tickets found.</td></tr>:
                filtered.map(t=>(<tr key={t.ref} style={{cursor:"pointer"}} onClick={()=>setSelectedRef(t.ref)}>
                  <td className="mono" style={{color:AC}}>{t.ref}</td>
                  <td>{t.clientName||"—"}</td>
                  <td style={{fontSize:12}}>{SERVICES.find(s=>s.id===t.serviceType)?.label||t.serviceType||"—"}</td>
                  <td style={{fontSize:12}}>{t.propertyType||"—"}</td>
                  <td><span className="badge" style={{background:t.priority==="Urgent"?"rgba(239,68,68,0.15)":"rgba(0,200,150,0.08)",color:t.priority==="Urgent"?"#EF4444":AC}}>{t.priority||"Normal"}</span></td>
                  <td><StagePill s={t.status}/></td>
                  <td style={{fontSize:11,color:"var(--text4)"}}>{t.createdAt?new Date(t.createdAt).toLocaleDateString("en-ZA"):"—"}</td>
                </tr>))
              }
            </tbody>
          </table>
        </div>
      </div>

      {showNewModal&&<NewTicketModal onClose={()=>setShowNewModal(false)} onSaved={(doc)=>{setSelectedRef(doc.ref);}} cfg={cfg} showToast={showToast}/>}
    </div>
  );
}

/* ── CUSTOMERS PAGE ── */
function CustomersPage({tickets, cfg, showToast}){
  const [search,setSearch]=useState("");
  const customers=useMemo(()=>{
    const map={};
    tickets.forEach(t=>{
      const key=t.phone||t.clientName;
      if(!key)return;
      if(!map[key])map[key]={name:t.clientName,phone:t.phone,email:t.email,company:t.company,address:t.address,propertyType:t.propertyType,tickets:[]};
      map[key].tickets.push(t.ref);
    });
    return Object.values(map);
  },[tickets]);

  const filtered=customers.filter(c=>(c.name||"").toLowerCase().includes(search.toLowerCase()) || (c.phone||"").includes(search));

  return(
    <div className="page-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div className="searchbar" style={{width:300}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers…"/></div>
        <div style={{fontSize:13,color:"var(--text3)"}}>{filtered.length} customers</div>
      </div>
      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Company</th><th>Tickets</th><th>Property Type</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="6" style={{textAlign:"center",padding:32,color:"var(--text4)"}}>No customers found.</td></tr>:
                filtered.map((c,i)=>(<tr key={i}><td style={{fontWeight:600,color:"var(--text)"}}>{c.name||"—"}</td><td>{c.phone||"—"}</td><td>{c.email||"—"}</td><td>{c.company||"—"}</td><td><span className="badge" style={{background:"rgba(0,200,150,0.08)",color:AC}}>{c.tickets.length}</span></td><td style={{fontSize:12}}>{c.propertyType||"—"}</td></tr>))
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── ACTIVE JOBS PAGE ── */
function ActiveJobsPage({jobs, tickets, cfg, showToast}){
  const [filterTeam,setFilterTeam]=useState("");
  const [search,setSearch]=useState("");

  const filtered=jobs.filter(j=>{
    if(j.status==="completed"||j.status==="closed")return false;
    if(filterTeam && j.team!==filterTeam)return false;
    if(search && !j.ticketRef.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const updateJobStatus = async (jobId, status) => {
    try {
      await col("jobs").doc(jobId).update({status, updatedAt: ts()});
      const job = jobs.find(j => j.id === jobId);
      if (job && status === "completed") {
        await fsUpdate("tickets", job.ticketRef, { status: "completed" });
        await addNoteToTicket(job.ticketRef, "✅ Job completed - ready for client sign-off", "stage", "Office");
      }
      showToast(`Job ${status}`);
    } catch(e) {
      showToast("Failed to update job", "error");
    }
  };

  return(
    <div className="page-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          <div className="searchbar" style={{width:220}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search jobs…"/></div>
          <select className="field-input" style={{width:140,padding:"8px 10px"}} value={filterTeam} onChange={e=>setFilterTeam(e.target.value)}><option value="">All Teams</option>{cfg.teams.map(t=><option key={t}>{t}</option>)}</select>
        </div>
        <span style={{fontSize:13,color:"var(--text3)"}}>{filtered.length} active</span>
      </div>
      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>Ticket</th><th>Client</th><th>Date</th><th>Team</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="6" style={{textAlign:"center",padding:32,color:"var(--text4)"}}>No active jobs.</td></tr>:
                filtered.map(j=>{
                  const t=tickets.find(tk=>tk.ref===j.ticketRef);
                  return(<tr key={j.id}>
                    <td className="mono" style={{color:AC}}>{j.ticketRef}</td>
                    <td>{t?.clientName||"—"}</td>
                    <td>{j.scheduledDate} {j.scheduledTime||""}</td>
                    <td>{j.team||"Unassigned"}</td>
                    <td><StagePill s={j.status}/></td>
                    <td style={{display:"flex",gap:4}}>
                      {j.status==="scheduled"&&<button className="btn btn-primary btn-xs" onClick={()=>updateJobStatus(j.id,"in-progress")}>Start</button>}
                      {j.status==="in-progress"&&<button className="btn btn-primary btn-xs" onClick={()=>updateJobStatus(j.id,"completed")}>Complete</button>}
                    </td>
                  </tr>);
                })
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function StaffManagementPage({cfg, showToast, staffList, setStaffList}){
  const [showAdd,setShowAdd]=useState(false);
  const [editingStaff,setEditingStaff]=useState(null);
  const [newStaff,setNewStaff]=useState({name:"",role:"Cleaner",phone:"",email:"",team:""});
  const [staff,setStaff] = useState(staffList || []);

  useEffect(()=>{
    const unsub = col("staff").onSnapshot(snap=>{
      const data = snap.docs.map(d=>({id:d.id,...d.data()}));
      setStaff(data);
      setStaffList && setStaffList(data);
    });
    return ()=>unsub();
  },[]);

  const addStaff=async()=>{
    if(!newStaff.name.trim()){showToast("Name required","error");return;}
    await col("staff").add({...newStaff,createdAt:ts()});
    setNewStaff({name:"",role:"Cleaner",phone:"",email:"",team:""});
    setShowAdd(false);
    showToast("Staff added ✓");
  };

  const updateStaff=async(id, data)=>{
    await col("staff").doc(id).update(data);
    showToast("Staff updated ✓");
    setEditingStaff(null);

  const deleteStaff=async(id)=>{
    if(window.confirm("Delete this staff member?")){

                        <td><span className="badge" style={{background:"rgba(139,92,246,0.15)",color:"#8B5CF6"}}>{s.role}</span></td>
                        <td>{s.phone||"—"}</td>
                        <td>{s.email||"—"}</td>

/* ── REPORTS PAGE ── */
function ReportsPage({invoices, jobs, tickets, cfg}){
  const totalRevenue=invoices.reduce((sum,i)=>sum+Number(i.amountPaid||0),0);
  const totalInvoiced=invoices.reduce((sum,i)=>sum+Number(i.total||0),0);
  const completionRate=tickets.length?Math.round(tickets.filter(t=>t.status==="completed"||t.status==="closed").length/tickets.length*100):0;
  const monthlyData=useMemo(()=>{
    const data={};
    invoices.forEach(i=>{
      const month=i.createdAt?new Date(i.createdAt).toLocaleString("en-ZA",{month:"short",year:"numeric"}):"Unknown";
      if(!data[month])data[month]={invoiced:0,paid:0};
      data[month].invoiced+=Number(i.total||0);
      data[month].paid+=Number(i.amountPaid||0);
    });
    return Object.entries(data).sort((a,b)=>new Date(a[0])-new Date(b[0]));
  },[invoices]);

  return(
    <div className="page-content">
      <div className="stats-row">
        <div className="stat-card"><div className="stat-val" style={{color:"#22C55E"}}>R {totalRevenue.toFixed(2)}</div><div className="stat-lbl">Total Revenue</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#0EA5E9"}}>R {totalInvoiced.toFixed(2)}</div><div className="stat-lbl">Total Invoiced</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#8B5CF6"}}>{completionRate}%</div><div className="stat-lbl">Completion Rate</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#F59E0B"}}>{invoices.filter(i=>i.status!=="paid").length}</div><div className="stat-lbl">Outstanding</div></div>
      </div>
      <div className="card">
        <div className="card-header"><div className="card-title">📊 Monthly Revenue</div></div>
        <div className="card-body">
          {monthlyData.length===0?<div style={{textAlign:"center",color:"var(--text4)",padding:20}}>No data yet.</div>:
            <table className="tbl"><thead><tr><th>Month</th><th>Invoiced</th><th>Paid</th><th>% Collected</th></tr></thead><tbody>{monthlyData.map(([month,data])=>(<tr key={month}><td>{month}</td><td>R {data.invoiced.toFixed(2)}</td><td style={{color:"#22C55E"}}>R {data.paid.toFixed(2)}</td><td>{data.invoiced?Math.round(data.paid/data.invoiced*100):0}%</td></tr>))}</tbody></table>
          }
        </div>
      </div>
    </div>
  );
}
