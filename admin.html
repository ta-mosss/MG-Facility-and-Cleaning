/* ════════════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════════════ */
function App(){
  const [auth,setAuth]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [selTicket,setSelTicket]=useState(null);
  const [theme,setTheme]=useState(localStorage.getItem("mgfc-theme")||"dark");
  const [cfg,setCfg]=useState(DEFAULT_CFG);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState({msg:"",type:"ok"});
  const [staffList,setStaffList]=useState([]);

  const [tickets,setTickets]=useState([]);
  const [customers,setCustomers]=useState([]);
  const [quotes,setQuotes]=useState([]);
  const [jobs,setJobs]=useState([]);
  const [invoices,setInvoices]=useState([]);
  const [inspections,setInspections]=useState([]);
  const [signoffs,setSignoffs]=useState([]);

  useEffect(()=>{
    document.body.className=theme;
    localStorage.setItem("mgfc-theme",theme);
  },[theme]);

  useEffect(()=>{
    col("settings").doc("config").get().then(snap=>{
      if(snap.exists)setCfg({...DEFAULT_CFG,...snap.data()});
      setLoading(false);
    }).catch(()=>setLoading(false));

    const unsubs=[
      col("tickets").orderBy("createdAt","desc").onSnapshot(snap=>setTickets(snap.docs.map(d=>({...d.data(),id:d.id})))),
      col("customers").onSnapshot(snap=>setCustomers(snap.docs.map(d=>({id:d.id,...d.data()})))),
      col("quotes").orderBy("createdAt","desc").onSnapshot(snap=>setQuotes(snap.docs.map(d=>({...d.data(),id:d.id})))),
      col("jobs").orderBy("createdAt","desc").onSnapshot(snap=>setJobs(snap.docs.map(d=>({id:d.id,...d.data()})))),
      col("invoices").orderBy("createdAt","desc").onSnapshot(snap=>setInvoices(snap.docs.map(d=>({id:d.id,...d.data()})))),
      col("inspections").orderBy("createdAt","desc").onSnapshot(snap=>setInspections(snap.docs.map(d=>({id:d.id,...d.data()})))),
      col("signoffs").orderBy("createdAt","desc").onSnapshot(snap=>setSignoffs(snap.docs.map(d=>({id:d.id,...d.data()})))),
      col("staff").onSnapshot(snap=>setStaffList(snap.docs.map(d=>({id:d.id,...d.data()})))),
    ];
    return()=>unsubs.forEach(u=>u());
  },[]);

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"ok"}),3000);};

  const counts={
    pendingApproval: tickets.filter(t=>t.status==="awaiting-approval").length,
    activeJobs: jobs.filter(j=>j.status==="in-progress"||j.status==="scheduled").length,
    overdueInvoices: invoices.filter(i=>i.status!=="paid"&&i.dueDate&&new Date(i.dueDate)<new Date()).length,
  };

  if(loading)return<Spinner/>;
  if(!auth)return<Login cfg={cfg} onAuth={()=>setAuth(true)}/>;

  const renderPage=()=>{
    switch(page){
      case "dashboard": return <Dashboard tickets={tickets} quotes={quotes} jobs={jobs} invoices={invoices} cfg={cfg} setPage={setPage} setSel={setSelTicket}/>;
      case "tickets": return <TicketsPage tickets={tickets} quotes={quotes} jobs={jobs} invoices={invoices} inspections={inspections} signoffs={signoffs} cfg={cfg} setPage={setPage} setSel={setSelTicket} showToast={showToast} selTicket={selTicket} staffList={staffList}/>;
      case "customers": return <CustomersPage tickets={tickets} cfg={cfg} showToast={showToast}/>;
      case "quotations": return <QuotationsPage quotes={quotes} tickets={tickets} cfg={cfg} showToast={showToast} setPage={setPage}/>;
      case "scheduling": return <EnhancedScheduling jobs={jobs} tickets={tickets} cfg={cfg} showToast={showToast} setPage={setPage}/>;
      case "jobs": return <ActiveJobsPage jobs={jobs} tickets={tickets} cfg={cfg} showToast={showToast}/>;
      case "staff": return <StaffManagementPage cfg={cfg} showToast={showToast} staffList={staffList} setStaffList={setStaffList}/>;
      case "whatsapp": return <WhatsAppCenterPage tickets={tickets} cfg={cfg} showToast={showToast} staffList={staffList}/>;
      case "inspections": return <SiteInspectionsPage inspections={inspections} tickets={tickets} cfg={cfg} showToast={showToast}/>;
      case "signoffs": return <ClientSignOffsPage signoffs={signoffs} tickets={tickets} cfg={cfg} showToast={showToast} setPage={setPage}/>;
      case "invoices": return <InvoicesPage invoices={invoices} tickets={tickets} cfg={cfg} showToast={showToast} setPage={setPage}/>;
      case "reports": return <ReportsPage invoices={invoices} jobs={jobs} tickets={tickets} cfg={cfg}/>;
      case "mobile": return <MobileTeamPortal jobs={jobs} tickets={tickets} cfg={cfg} showToast={showToast}/>;
      case "settings": return <SettingsPage cfg={cfg} setCfg={setCfg} showToast={showToast}/>;
      default: return <Dashboard tickets={tickets} quotes={quotes} jobs={jobs} invoices={invoices} cfg={cfg} setPage={setPage} setSel={setSelTicket}/>;
    }
  };

  const pageTitles={
    dashboard:"Dashboard", tickets:"Cleaning Tickets", customers:"Customers", quotations:"Quotations",
    scheduling:"Scheduling", jobs:"Active Jobs", staff:"Staff Management", whatsapp:"WhatsApp Center",
    inspections:"Site Inspections", signoffs:"Client Sign-Offs", invoices:"Invoices", reports:"Reports",
    mobile:"Team Portal", settings:"Settings",
  };

  return(
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} cfg={cfg} counts={counts} theme={theme} toggleTheme={()=>setTheme(t=>t==="dark"?"light":"dark")}/>
      <div className="content-area">
        <TopBar title={pageTitles[page]||"Dashboard"} sub={`${cfg.shortName} · ${cfg.bizName}`}/>
        {renderPage()}
      </div>
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
